<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d14; font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .frame { width: 420px; height: 900px; background: #0A0A0F; border: 10px solid #1a1a22; border-radius: 54px; overflow: hidden; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .statusbar { height: 40px; background: #0A0A0F; display: flex; align-items: center; justify-content: space-between; padding: 0 32px 0 28px; font-size: 14px; color: white; font-weight: 600; }
  .notch { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 0 0 18px 18px; z-index: 10; }
  .bg-dim { position: absolute; inset: 40px 0 0 0; background: rgba(0,0,0,0.6); z-index: 5; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: #0A0A0F; border-radius: 24px 24px 0 0; z-index: 6; border-top: 1px solid rgba(0,230,118,0.2); padding-bottom: 20px; }
  .hidden-bg { opacity: 0.35; }
</style>
</head>
<body>
<div class="frame">
  <div class="notch"></div>

  <div class="statusbar">
    <span>9:41</span>
    <span style="display: flex; gap: 5px; align-items: center;">
      <span style="font-size: 11px;">●●●</span>
      <span style="display: inline-block; width: 18px; height: 11px; border: 1.5px solid white; border-radius: 3px; position: relative;"><span style="position: absolute; top: 1.5px; left: 1.5px; bottom: 1.5px; right: 5px; background: white;"></span></span>
    </span>
  </div>

  <!-- Dimmed Roster backdrop -->
  <div class="hidden-bg">
    <div style="padding: 14px 20px 6px; display: flex; align-items: center; gap: 12px;">
      <div style="width: 36px; height: 36px; border-radius: 50%; background: #15151c;"></div>
      <div>
        <div style="font-weight: 900; font-style: italic; font-size: 24px; color: white; letter-spacing: -0.04em;">ROSTER</div>
      </div>
    </div>
  </div>

  <!-- Dim overlay -->
  <div class="bg-dim"></div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <!-- Handle -->
    <div style="padding: 10px 0 0; display: flex; justify-content: center;">
      <div style="width: 40px; height: 4px; background: #333; border-radius: 2px;"></div>
    </div>

    <!-- Header -->
    <div style="padding: 16px 20px 16px; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div style="font-weight: 900; font-style: italic; font-size: 26px; color: white; letter-spacing: -0.04em; line-height: 1;">ADD FRIENDS</div>
        <div style="font-size: 12px; color: #888; margin-top: 4px;">Build your roster. Bet on each other.</div>
      </div>
      <div style="width: 32px; height: 32px; border-radius: 50%; background: #1a1a22; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px;">✕</div>
    </div>

    <!-- Method 1: Share link -->
    <div style="padding: 0 20px 16px;">
      <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666; margin-bottom: 8px;">YOUR INVITE LINK</div>
      <div style="background: #0f0f16; border: 1.5px solid rgba(0,230,118,0.3); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px;">
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; color: white; font-family: 'SF Mono', ui-monospace, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">lynk.app/add/<span style="color: #00E676; font-weight: 900;">wildercb</span></div>
          <div style="font-size: 10px; color: #666; margin-top: 2px;">Expires in 7 days · Regenerates on use</div>
        </div>
        <button style="background: rgba(0,230,118,0.15); border: 1.5px solid #00E676; color: #00E676; font-weight: 900; font-size: 10px; padding: 6px 10px; border-radius: 8px; letter-spacing: 0.1em;">COPY</button>
      </div>

      <!-- Share chips -->
      <div style="display: flex; gap: 6px; margin-top: 8px;">
        <button style="flex: 1; background: #15151c; border: 1.5px solid #333; color: white; font-weight: 700; font-size: 11px; padding: 10px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
          <span style="font-size: 13px;">💬</span>
          <span>MESSAGES</span>
        </button>
        <button style="flex: 1; background: #15151c; border: 1.5px solid #333; color: white; font-weight: 700; font-size: 11px; padding: 10px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
          <span style="font-size: 13px;">📋</span>
          <span>COPY QR</span>
        </button>
        <button style="flex: 1; background: #15151c; border: 1.5px solid #333; color: white; font-weight: 700; font-size: 11px; padding: 10px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
          <span style="font-size: 13px;">↗</span>
          <span>SHARE</span>
        </button>
      </div>
    </div>

    <!-- Divider -->
    <div style="padding: 0 20px 16px; display: flex; align-items: center; gap: 10px;">
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
      <span style="font-size: 10px; color: #666; font-weight: 900; letter-spacing: 0.2em;">OR</span>
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
    </div>

    <!-- Method 2: Search -->
    <div style="padding: 0 20px 16px;">
      <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666; margin-bottom: 8px;">FIND BY USERNAME</div>
      <div style="background: #15151c; border: 1.5px solid rgba(0,230,118,0.3); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 8px;">
        <span style="color: #00E676; font-size: 14px;">🔍</span>
        <span style="font-size: 14px; color: white; font-family: 'SF Mono', ui-monospace, monospace;">@jakere<span style="display: inline-block; width: 2px; height: 16px; background: #00E676; margin-left: 1px; vertical-align: middle;"></span></span>
      </div>

      <!-- Search results -->
      <div style="margin-top: 8px;">
        <div style="background: #15151c; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
          <div style="width: 36px; height: 36px; border-radius: 50%; background: #2a2a35; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 13px;">J</div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-weight: 900; font-size: 13px; color: white;">Jake Reed</div>
            <div style="font-size: 10px; color: #888;">@jakereed · 3 mutual</div>
          </div>
          <button style="background: #00E676; color: #0A0A0F; font-weight: 900; font-size: 10px; padding: 6px 12px; border: none; border-radius: 8px; letter-spacing: 0.1em;">+ ADD</button>
        </div>

        <div style="background: #15151c; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;">
          <div style="width: 36px; height: 36px; border-radius: 50%; background: #2a2a35; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 13px;">J</div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-weight: 900; font-size: 13px; color: white;">Jake Renner</div>
            <div style="font-size: 10px; color: #888;">@jakerenner</div>
          </div>
          <button style="background: #00E676; color: #0A0A0F; font-weight: 900; font-size: 10px; padding: 6px 12px; border: none; border-radius: 8px; letter-spacing: 0.1em;">+ ADD</button>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div style="padding: 0 20px 16px; display: flex; align-items: center; gap: 10px;">
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
      <span style="font-size: 10px; color: #666; font-weight: 900; letter-spacing: 0.2em;">OR</span>
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
    </div>

    <!-- Method 3: Contacts -->
    <div style="padding: 0 20px;">
      <button style="width: 100%; background: #15151c; border: 1.5px dashed #444; color: white; font-weight: 900; font-size: 13px; padding: 14px; border-radius: 12px; letter-spacing: 0.08em; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span style="font-size: 16px;">📱</span>
        <span>SYNC FROM CONTACTS</span>
      </button>
      <div style="font-size: 10px; color: #666; text-align: center; margin-top: 6px;">We'll find friends already on Lynk. Numbers never stored.</div>
    </div>
  </div>
</div>
</body>
</html>
