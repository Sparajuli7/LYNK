<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d14; font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .frame { width: 420px; height: 900px; background: #0A0A0F; border: 10px solid #1a1a22; border-radius: 54px; overflow: hidden; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .statusbar { height: 40px; background: #0A0A0F; display: flex; align-items: center; justify-content: space-between; padding: 0 32px 0 28px; font-size: 14px; color: white; font-weight: 600; }
  .notch { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 0 0 18px 18px; z-index: 10; }
  .bg-dim { position: absolute; inset: 40px 0 0 0; background: rgba(0,0,0,0.6); z-index: 5; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: #0A0A0F; border-radius: 24px 24px 0 0; z-index: 6; border-top: 1px solid rgba(0,230,118,0.2); padding-bottom: 20px; }
  .hidden-bg { opacity: 0.35; filter: blur(0.5px); }
</style>
</head>
<body>
<div class="frame">
  <div class="notch"></div>

  <div class="statusbar">
    <span>9:41</span>
    <span style="display: flex; gap: 5px; align-items: center;">
      <span style="font-size: 11px;">●●●</span>
      <span style="display: inline-block; width: 18px; height: 11px; border: 1.5px solid white; border-radius: 3px; position: relative;"><span style="position: absolute; top: 1.5px; left: 1.5px; bottom: 1.5px; right: 5px; background: white;"></span></span>
    </span>
  </div>

  <!-- Dimmed home backdrop -->
  <div class="hidden-bg">
    <div style="padding: 14px 20px 12px; display: flex; align-items: center; gap: 12px;">
      <div style="width: 44px; height: 44px; border-radius: 50%; background: #00E676; padding: 2.5px;"><div style="width: 100%; height: 100%; border-radius: 50%; background: #2a2a35;"></div></div>
      <div style="flex: 1;">
        <div style="font-weight: 900; font-size: 16px; color: white;">Wilder</div>
        <div style="font-size: 12px; color: #999;">8W 0L 0V</div>
      </div>
    </div>
    <div style="padding: 20px 20px 10px;">
      <div style="font-weight: 900; font-style: italic; font-size: 28px; color: white; letter-spacing: -0.03em;">MY BETS</div>
    </div>
  </div>

  <!-- Dim overlay -->
  <div class="bg-dim"></div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <!-- Handle -->
    <div style="padding: 10px 0 0; display: flex; justify-content: center;">
      <div style="width: 40px; height: 4px; background: #333; border-radius: 2px;"></div>
    </div>

    <!-- Header -->
    <div style="padding: 16px 20px 18px; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div style="font-weight: 900; font-style: italic; font-size: 26px; color: white; letter-spacing: -0.04em; line-height: 1;">QUICK BET</div>
        <div style="font-size: 12px; color: #888; margin-top: 4px;">Place a claim. Face the consequences.</div>
      </div>
      <div style="width: 32px; height: 32px; border-radius: 50%; background: #1a1a22; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px;">✕</div>
    </div>

    <!-- Claim input -->
    <div style="padding: 0 20px 16px;">
      <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666; margin-bottom: 6px;">THE CLAIM</div>
      <div style="background: #15151c; border: 1.5px solid rgba(0,230,118,0.35); border-radius: 12px; padding: 14px 16px; min-height: 72px;">
        <div style="font-size: 18px; font-weight: 900; color: white; line-height: 1.2; letter-spacing: -0.01em;">I'll run 3 miles every morning this week</div>
        <div style="width: 2px; height: 20px; background: #00E676; display: inline-block; margin-top: 4px; animation: blink 1s infinite;"></div>
      </div>
      <div style="font-size: 10px; color: #666; margin-top: 6px;">⚡ 47 / 120 characters</div>
    </div>

    <!-- Stake chips -->
    <div style="padding: 0 20px 16px;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666;">STAKE</div>
        <div style="font-size: 18px; font-weight: 900; color: white; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em;">$20.00</div>
      </div>
      <div style="display: flex; gap: 6px;">
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 900; font-size: 12px; padding: 10px 0; border-radius: 10px; letter-spacing: 0.05em; font-family: 'SF Mono', ui-monospace, monospace;">$5</button>
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 900; font-size: 12px; padding: 10px 0; border-radius: 10px; letter-spacing: 0.05em; font-family: 'SF Mono', ui-monospace, monospace;">$10</button>
        <button style="flex: 1; background: rgba(0,230,118,0.15); border: 1.5px solid #00E676; color: #00E676; font-weight: 900; font-size: 12px; padding: 10px 0; border-radius: 10px; letter-spacing: 0.05em; font-family: 'SF Mono', ui-monospace, monospace;">$20</button>
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 900; font-size: 12px; padding: 10px 0; border-radius: 10px; letter-spacing: 0.05em; font-family: 'SF Mono', ui-monospace, monospace;">$50</button>
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 900; font-size: 12px; padding: 10px 0; border-radius: 10px; letter-spacing: 0.05em;">CUSTOM</button>
      </div>
    </div>

    <!-- Group selector -->
    <div style="padding: 0 20px 16px;">
      <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666; margin-bottom: 8px;">POST TO</div>
      <div style="display: flex; gap: 6px;">
        <button style="background: rgba(0,230,118,0.15); border: 1.5px solid #00E676; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 6px;">
          <span style="font-size: 16px;">🔥</span>
          <span style="font-size: 12px; font-weight: 900; color: white;">The Degenerates</span>
        </button>
        <button style="background: transparent; border: 1.5px solid #333; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 6px;">
          <span style="font-size: 16px;">💪</span>
          <span style="font-size: 12px; font-weight: 700; color: #ccc;">Gym Rats</span>
        </button>
        <button style="background: transparent; border: 1.5px solid #333; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 6px; color: #888;">
          <span style="font-size: 14px;">+</span>
          <span style="font-size: 12px; font-weight: 700;">More</span>
        </button>
      </div>
    </div>

    <!-- Deadline chips -->
    <div style="padding: 0 20px 16px;">
      <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.15em; color: #666; margin-bottom: 8px;">DEADLINE</div>
      <div style="display: flex; gap: 6px;">
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 700; font-size: 11px; padding: 8px 0; border-radius: 10px;">TODAY</button>
        <button style="flex: 1; background: rgba(0,230,118,0.15); border: 1.5px solid #00E676; color: #00E676; font-weight: 900; font-size: 11px; padding: 8px 0; border-radius: 10px;">THIS WEEK</button>
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 700; font-size: 11px; padding: 8px 0; border-radius: 10px;">THIS MONTH</button>
        <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 700; font-size: 11px; padding: 8px 0; border-radius: 10px;">📅 PICK</button>
      </div>
    </div>

    <!-- Optional punishment -->
    <div style="padding: 0 20px 18px;">
      <div style="background: #15151c; border: 1px dashed #333; border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div style="font-size: 11px; font-weight: 900; color: #FF3D57; letter-spacing: 0.1em;">+ ADD PUNISHMENT</div>
          <div style="font-size: 10px; color: #666; margin-top: 2px;">Optional — what happens if you lose?</div>
        </div>
        <div style="color: #666; font-size: 18px;">›</div>
      </div>
    </div>

    <!-- Place Bet CTA -->
    <div style="padding: 0 20px;">
      <button style="width: 100%; background: #00E676; color: #0A0A0F; font-weight: 900; font-size: 14px; padding: 16px; border: none; border-radius: 14px; letter-spacing: 0.12em; box-shadow: 0 0 0 5px rgba(0,230,118,0.18);">✓ PLACE BET · $20.00</button>
      <div style="font-size: 10px; color: #666; text-align: center; margin-top: 8px;">Your friends will vote on the outcome</div>
    </div>
  </div>
</div>
</body>
</html>
