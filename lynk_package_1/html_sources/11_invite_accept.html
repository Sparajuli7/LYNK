<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d14; font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .frame { width: 420px; height: 900px; background: #0A0A0F; border: 10px solid #1a1a22; border-radius: 54px; overflow: hidden; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .statusbar { height: 40px; background: #0A0A0F; display: flex; align-items: center; justify-content: space-between; padding: 0 32px 0 28px; font-size: 14px; color: white; font-weight: 600; }
  .notch { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 0 0 18px 18px; z-index: 10; }
  .diagonal-grid {
    background-image:
      linear-gradient(45deg, rgba(0,230,118,0.04) 1px, transparent 1px),
      linear-gradient(-45deg, rgba(0,230,118,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
  }
</style>
</head>
<body>
<div class="frame diagonal-grid">
  <div class="notch"></div>

  <div class="statusbar">
    <span>9:41</span>
    <span style="display: flex; gap: 5px; align-items: center;">
      <span style="font-size: 11px;">●●●</span>
      <span style="display: inline-block; width: 18px; height: 11px; border: 1.5px solid white; border-radius: 3px; position: relative;"><span style="position: absolute; top: 1.5px; left: 1.5px; bottom: 1.5px; right: 5px; background: white;"></span></span>
    </span>
  </div>

  <!-- Close -->
  <div style="padding: 14px 20px; display: flex; justify-content: flex-end;">
    <div style="width: 32px; height: 32px; border-radius: 50%; background: #1a1a22; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px;">✕</div>
  </div>

  <!-- Label -->
  <div style="padding: 20px 20px 4px; text-align: center;">
    <div style="font-size: 11px; font-weight: 900; color: #00E676; letter-spacing: 0.25em;">● INVITE RECEIVED</div>
  </div>

  <!-- Inviter card -->
  <div style="padding: 24px 24px 24px; text-align: center;">
    <div style="position: relative; display: inline-block;">
      <div style="width: 120px; height: 120px; border-radius: 50%; background: #00E676; padding: 4px; margin: 0 auto;">
        <div style="width: 100%; height: 100%; border-radius: 50%; background: #2a2a35; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 48px;">W</div>
      </div>
      <div style="position: absolute; top: -6px; right: -8px; background: #FF3D57; color: white; font-size: 9px; font-weight: 900; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.12em;">🔥 3</div>
    </div>
    <div style="font-weight: 900; font-style: italic; font-size: 32px; color: white; letter-spacing: -0.04em; margin-top: 16px; line-height: 1;">WILDER</div>
    <div style="font-size: 13px; color: #888; margin-top: 4px;">@wildercb</div>
  </div>

  <!-- Invite message -->
  <div style="padding: 0 24px 24px; text-align: center;">
    <div style="font-weight: 900; font-style: italic; font-size: 22px; color: white; letter-spacing: -0.03em; line-height: 1.2;">Wilder wants to bet on you.</div>
    <div style="font-size: 13px; color: #888; margin-top: 8px; line-height: 1.4;">Accept to add each other as friends.<br>You'll both be able to start 1v1 bets.</div>
  </div>

  <!-- Stats snapshot -->
  <div style="padding: 0 20px 20px;">
    <div style="background: #0f0f16; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px; border-top: 1.5px dashed rgba(255,255,255,0.1); border-bottom: 1.5px dashed rgba(255,255,255,0.1); display: flex; justify-content: space-around;">
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 900; color: white; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em;">8</div>
        <div style="font-size: 9px; color: #666; font-weight: 700; letter-spacing: 0.12em;">BETS</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 900; color: #00E676; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em;">100<span style="font-size: 13px;">%</span></div>
        <div style="font-size: 9px; color: #666; font-weight: 700; letter-spacing: 0.12em;">WIN</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 900; color: white; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em;">3</div>
        <div style="font-size: 9px; color: #666; font-weight: 700; letter-spacing: 0.12em;">STREAK</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 900; color: #FF3D57; font-family: 'SF Mono', ui-monospace, monospace; letter-spacing: -0.02em;">0</div>
        <div style="font-size: 9px; color: #666; font-weight: 700; letter-spacing: 0.12em;">PUNISH</div>
      </div>
    </div>
  </div>

  <!-- Mutual friends hint -->
  <div style="padding: 0 20px 16px;">
    <div style="background: #15151c; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px;">
      <div style="display: flex;">
        <div style="width: 24px; height: 24px; border-radius: 50%; background: #555; border: 2px solid #15151c;"></div>
        <div style="width: 24px; height: 24px; border-radius: 50%; background: #444; border: 2px solid #15151c; margin-left: -8px;"></div>
        <div style="width: 24px; height: 24px; border-radius: 50%; background: #666; border: 2px solid #15151c; margin-left: -8px;"></div>
      </div>
      <div style="font-size: 11px; color: #ccc;"><span style="color: #00E676; font-weight: 900;">3 mutual friends</span> · Emma, Jake, Sam</div>
    </div>
  </div>

  <!-- Actions -->
  <div style="position: absolute; bottom: 24px; left: 20px; right: 20px;">
    <button style="width: 100%; background: #00E676; color: #0A0A0F; font-weight: 900; font-size: 14px; padding: 16px; border: none; border-radius: 14px; letter-spacing: 0.12em; box-shadow: 0 0 0 5px rgba(0,230,118,0.18); margin-bottom: 10px;">✓ ACCEPT & ADD WILDER</button>
    <div style="display: flex; gap: 8px;">
      <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #ccc; font-weight: 900; font-size: 12px; padding: 12px; border-radius: 12px; letter-spacing: 0.1em;">VIEW FULL CARD</button>
      <button style="flex: 1; background: transparent; border: 1.5px solid #333; color: #888; font-weight: 700; font-size: 12px; padding: 12px; border-radius: 12px; letter-spacing: 0.1em;">DECLINE</button>
    </div>
  </div>
</div>
</body>
</html>
